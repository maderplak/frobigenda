<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrobiGenda</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eaf5ee;
  --surface: #f5fdf7;
  --surface2: #dff0e5;
  --border: #c2deca;
  --accent: #2d7a4f;
  --accent2: #e05252;
  --accent3: #27ae60;
  --accent4: #d4a017;
  --text: #1a2e22;
  --text2: #4a7260;
  --text3: #85a893;
  --compras: #4a6fa5;
  --comex: #27ae60;
  --mantenimiento: #c0851a;
  --calidad: #c0392b;
  --alta: #c0392b;
  --media: #c0851a;
  --baja: #27ae60;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 20px;
}
h1, h2, h3, .brand { font-family: 'Syne', sans-serif; font-weight: 800; }
.container { max-width: 1200px; margin: 0 auto; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}
.brand { font-size: 2rem; color: var(--accent); }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-secondary { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
.btn-danger { background: #fee; color: var(--accent2); border: 1px solid #fcc; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  transition: transform 0.2s;
  cursor: pointer;
}
.card:hover { transform: scale(1.02); }
.card.stale { border-left: 5px solid var(--accent2); }
.card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
.tag {
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
  text-transform: uppercase;
}
.tag-area { background: var(--surface2); color: var(--accent); }
.tag-prio { color: #fff; }
.prio-alta { background: var(--alta); }
.prio-media { background: var(--media); }
.prio-baja { background: var(--baja); }

.card-title { font-size: 1.1rem; margin-bottom: 8px; }
.card-meta { font-size: 0.85rem; color: var(--text2); display: flex; flex-direction: column; gap: 4px; }
.stale-warning { color: var(--accent2); font-weight: 700; margin-top: 10px; font-size: 0.8rem; }

/* MODALES */
.modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(26,46,34,0.6);
  backdrop-filter: blur(4px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-content {
  background: var(--surface);
  width: 90%;
  max-width: 600px;
  max-height: 90vh;
  border-radius: 24px;
  padding: 30px;
  overflow-y: auto;
  position: relative;
}
.close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; }

.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
input, select, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #fff;
  font-family: inherit;
}

.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  padding: 15px 25px;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  z-index: 2000;
  display: none;
  animation: slideIn 0.3s forwards;
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
.tab { padding: 8px 16px; border-radius: 12px; background: var(--surface2); cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
.tab.active { background: var(--accent); color: #fff; }

.bitacora-list { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; }
.bitacora-item { font-size: 0.85rem; margin-bottom: 8px; color: var(--text2); background: var(--surface2); padding: 8px; border-radius: 8px; }

</style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">FrobiGenda</div>
    <div style="display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="loadData()">Refrescar</button>
      <button class="btn" onclick="openCreateModal()">+ Nueva Gestión</button>
    </div>
  </header>

  <div class="tabs" id="tabsArea">
    <div class="tab active" onclick="filterByArea('Todas')">Todas</div>
    <div class="tab" onclick="filterByArea('Compras')">Compras</div>
    <div class="tab" onclick="filterByArea('Comex')">Comex</div>
    <div class="tab" onclick="filterByArea('Mantenimiento')">Mantenimiento</div>
    <div class="tab" onclick="filterByArea('Calidad')">Calidad</div>
    <div class="tab" onclick="filterByArea('Sistemas')">Sistemas</div>
    <div class="tab" onclick="filterByArea('Administración')">Administración</div>
  </div>

  <div id="gestionesGrid" class="grid"></div>
</div>

<div id="gestionModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle" style="margin-bottom: 20px;">Nueva Gestión</h2>
    <form id="gestionForm">
      <input type="hidden" id="f_id">
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="f_titulo" required>
      </div>
      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
          <label>Área</label>
          <select id="f_area">
            <option>Compras</option>
            <option>Comex</option>
            <option>Mantenimiento</option>
            <option>Calidad</option>
            <option>Sistemas</option>
            <option>Administración</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="f_prioridad">
            <option>Baja</option>
            <option>Media</option>
            <option>Alta</option>
          </select>
        </div>
      </div>
      <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
          <label>Responsable</label>
          <input type="text" id="f_responsable">
        </div>
        <div class="form-group">
          <label>Fecha Límite</label>
          <input type="date" id="f_fecha_limite">
        </div>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="f_descripcion" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="f_estado">
          <option>Pendiente</option>
          <option>En curso</option>
          <option>Esperando</option>
          <option>Resuelta</option>
        </select>
      </div>
      
      <div id="editOnly" style="display: none;">
        <div class="form-group">
          <label>Agregar a Bitácora</label>
          <div style="display: flex; gap: 5px;">
            <input type="text" id="f_new_bitacora" placeholder="Novedad...">
            <button type="button" class="btn" onclick="addBitacora()">+</button>
          </div>
          <div id="bitacoraContainer" class="bitacora-list"></div>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; margin-top: 20px;">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <div>
          <button type="button" id="btnDelete" class="btn btn-danger" style="display:none;" onclick="confirmDelete()">Eliminar</button>
          <button type="submit" class="btn">Guardar</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURACIÓN - TU NUEVA URL
const API_URL = 'https://script.google.com/macros/s/AKfycbx2AS35U_ALe12wzeqwkP0Df5PeYGFurqeU6JalHdQDcejARM1QJ4NnOiGSg2zsFs4Q/exec';

let GESTIONES = [];
let CURRENT_AREA = 'Todas';

// INICIO
window.onload = loadData;

async function loadData() {
  showToast('Cargando datos...');
  try {
    const res = await fetch(API_URL + '?action=getAll');
    const data = await res.json();
    GESTIONES = data;
    renderList();
  } catch(e) {
    showToast('Error al cargar datos de Google Sheets', 'error');
  }
}

function renderList() {
  const grid = document.getElementById('gestionesGrid');
  grid.innerHTML = '';

  const filtered = GESTIONES.filter(g => {
    if (g.archivada === true || g.archivada === 'true') return false;
    if (CURRENT_AREA === 'Todas') return true;
    return g.area === CURRENT_AREA;
  });

  filtered.forEach(g => {
    const isSt = isStale(g);
    const card = document.createElement('div');
    card.className = `card ${isSt ? 'stale' : ''}`;
    card.onclick = () => openEditModal(g);
    
    card.innerHTML = `
      <div class="card-header">
        <span class="tag tag-area">${g.area}</span>
        <span class="tag tag-prio prio-${g.prioridad.toLowerCase()}">${g.prioridad}</span>
      </div>
      <h3 class="card-title">${g.titulo}</h3>
      <div class="card-meta">
        <span>👤 ${g.responsable || 'Sin asignar'}</span>
        <span>📅 Límite: ${fmtDate(g.fecha_limite) || '--'}</span>
        <span>📍 Estado: <strong>${g.estado}</strong></span>
      </div>
      ${isSt ? `<div class="stale-warning">⚠️ Sin cambios hace ${staleDays(g)} días</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function filterByArea(area) {
  CURRENT_AREA = area;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.innerText === area);
  });
  renderList();
}

// FORMULARIO
const modal = document.getElementById('gestionModal');
const form = document.getElementById('gestionForm');

function openCreateModal() {
  form.reset();
  document.getElementById('f_id').value = '';
  document.getElementById('modalTitle').innerText = 'Nueva Gestión';
  document.getElementById('editOnly').style.display = 'none';
  document.getElementById('btnDelete').style.display = 'none';
  modal.style.display = 'flex';
}

function openEditModal(g) {
  document.getElementById('f_id').value = g.id;
  document.getElementById('f_titulo').value = g.titulo;
  document.getElementById('f_area').value = g.area;
  document.getElementById('f_prioridad').value = g.prioridad;
  document.getElementById('f_responsable').value = g.responsable;
  document.getElementById('f_fecha_limite').value = g.fecha_limite ? g.fecha_limite.split('T')[0] : '';
  document.getElementById('f_descripcion').value = g.descripcion;
  document.getElementById('f_estado').value = g.estado;
  
  document.getElementById('modalTitle').innerText = 'Editar Gestión';
  document.getElementById('editOnly').style.display = 'block';
  document.getElementById('btnDelete').style.display = 'inline-block';
  
  renderBitacora(g.bitacora);
  modal.style.display = 'flex';
}

function closeModal() { modal.style.display = 'none'; }

form.onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById('f_id').value;
  const action = id ? 'update' : 'create';
  
  const data = {
    id: id,
    titulo: document.getElementById('f_titulo').value,
    area: document.getElementById('f_area').value,
    prioridad: document.getElementById('f_prioridad').value,
    responsable: document.getElementById('f_responsable').value,
    fecha_limite: document.getElementById('f_fecha_limite').value,
    descripcion: document.getElementById('f_descripcion').value,
    estado: document.getElementById('f_estado').value
  };

  showToast('Guardando...');
  const res = await apiCall(action, data);
  
  if(res) {
    showToast('Guardado correctamente');
    closeModal();
    // Esperamos un segundo y recargamos para ver los cambios
    setTimeout(loadData, 1500);
  }
};

async function confirmDelete() {
  if(!confirm('¿Seguro quieres eliminar esta gestión?')) return;
  const id = document.getElementById('f_id').value;
  showToast('Eliminando...');
  const res = await apiCall('delete', { id });
  if(res) {
    showToast('Eliminado');
    closeModal();
    setTimeout(loadData, 1500);
  }
}

// BITÁCORA
function renderBitacora(jsonStr) {
  const container = document.getElementById('bitacoraContainer');
  container.innerHTML = '';
  try {
    const list = JSON.parse(jsonStr || '[]');
    list.reverse().forEach(item => {
      const div = document.createElement('div');
      div.className = 'bitacora-item';
      div.innerHTML = `<strong>${fmtDate(item.fecha)}:</strong> ${item.texto}`;
      container.appendChild(div);
    });
  } catch(e) {}
}

async function addBitacora() {
  const input = document.getElementById('f_new_bitacora');
  const id = document.getElementById('f_id').value;
  if(!input.value || !id) return;

  const gestion = GESTIONES.find(g => g.id === id);
  let list = [];
  try { list = JSON.parse(gestion.bitacora || '[]'); } catch(e) {}
  
  list.push({ fecha: new Date().toISOString(), texto: input.value });
  
  showToast('Actualizando bitácora...');
  const res = await apiCall('update', { id, bitacora: JSON.stringify(list) });
  if(res) {
    input.value = '';
    showToast('Bitácora actualizada');
    setTimeout(loadData, 1500);
    closeModal();
  }
}

// API CALL CON MODO NO-CORS PARA GOOGLE
async function apiCall(action, data) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors', // CRÍTICO: Evita error de CORS
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify({ action, ...data })
    });
    
    // Con no-cors la respuesta es opaca, asumimos éxito si no hay excepción
    return { success: true }; 
  } catch(e) {
    console.error("Error API:", e);
    showToast('Error de conexión', 'error');
    return null;
  }
}

// HELPERS
function isStale(g) {
  if(g.estado === 'Resuelta') return false;
  const ref = g.ultima_actualizacion || g.fecha_creacion;
  if(!ref) return false;
  return (new Date() - new Date(ref)) > 7 * 24 * 60 * 60 * 1000;
}
function staleDays(g) {
  const ref = g.ultima_actualizacion || g.fecha_creacion;
  return Math.floor((new Date() - new Date(ref)) / (24*60*60*1000));
}
function fmtDate(d) {
  if(!d) return '';
  try { 
    return new Date(d).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'}); 
  } catch { return d; }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.background = type === 'error' ? 'var(--accent2)' : 'var(--accent)';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

</script>
</body>
</html>
